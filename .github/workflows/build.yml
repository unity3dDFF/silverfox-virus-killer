name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Build CLI version
      run: |
        pyinstaller --onefile --name SilverFoxKiller --hidden-import psutil main.py
        
    - name: Build GUI version
      run: |
        pyinstaller --onefile --windowed --name SilverFoxKillerGUI --hidden-import psutil --hidden-import tkinter --hidden-import tkinter.ttk --hidden-import tkinter.messagebox --hidden-import tkinter.scrolledtext gui.py
        
    - name: Upload CLI artifact
      uses: actions/upload-artifact@v4
      with:
        name: SilverFoxKiller-CLI
        path: dist/SilverFoxKiller.exe
        
    - name: Upload GUI artifact
      uses: actions/upload-artifact@v4
      with:
        name: SilverFoxKiller-GUI
        path: dist/SilverFoxKillerGUI.exe
        
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/SilverFoxKiller.exe
          dist/SilverFoxKillerGUI.exe
        generate_release_notes: true
