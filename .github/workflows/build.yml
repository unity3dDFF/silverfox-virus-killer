name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Resolve application version
        shell: pwsh
        run: |
          $version = (python -c "from version import __version__; print(__version__)").Trim()
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Test and build Windows executables
        shell: pwsh
        run: ./build_windows.ps1 -Python python -SkipInstall

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: SilverFoxKiller-v${{ env.APP_VERSION }}-windows-x64
          path: dist/SilverFoxKiller-v${{ env.APP_VERSION }}-windows-x64.exe

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: SilverFoxKillerGUI-v${{ env.APP_VERSION }}-windows-x64
          path: dist/SilverFoxKillerGUI-v${{ env.APP_VERSION }}-windows-x64.exe

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: SHA256SUMS-v${{ env.APP_VERSION }}
          path: dist/SHA256SUMS-v${{ env.APP_VERSION }}.txt

      - name: Create latest release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/SilverFoxKiller-v${{ env.APP_VERSION }}-windows-x64.exe
            dist/SilverFoxKillerGUI-v${{ env.APP_VERSION }}-windows-x64.exe
            dist/SHA256SUMS-v${{ env.APP_VERSION }}.txt
          generate_release_notes: true
          make_latest: true
