name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run safety tests
        run: python -m unittest discover -s tests -v

      - name: Build CLI version
        run: pyinstaller --noconfirm --clean --onefile --name SilverFoxKiller --collect-all psutil --hidden-import history main.py

      - name: Build GUI version
        run: pyinstaller --noconfirm --clean --onefile --windowed --name SilverFoxKillerGUI --collect-all psutil --hidden-import repair.system_repair --hidden-import history gui.py

      - name: Generate checksums
        shell: pwsh
        run: |
          Get-ChildItem dist/*.exe | ForEach-Object {
            $hash = (Get-FileHash -Algorithm SHA256 $_.FullName).Hash.ToLowerInvariant()
            "$hash  $($_.Name)"
          } | Set-Content -Encoding ascii dist/SHA256SUMS.txt

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: SilverFoxKiller-CLI
          path: dist/SilverFoxKiller.exe

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: SilverFoxKiller-GUI
          path: dist/SilverFoxKillerGUI.exe

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: SHA256SUMS
          path: dist/SHA256SUMS.txt

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/SilverFoxKiller.exe
            dist/SilverFoxKillerGUI.exe
            dist/SHA256SUMS.txt
          generate_release_notes: true
